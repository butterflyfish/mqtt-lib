apiVersion: batch/v1
kind: Job
metadata:
  name: bench-PLACEHOLDER
  labels:
    app: mqoq-bench
    experiment: PLACEHOLDER
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: mqoq-bench
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: us-west1-docker.pkg.dev/quic-experiments-488321/mqoq-bench/mqttv5:bench
          args: []
          resources:
            requests:
              cpu: "2"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 4Gi
          volumeMounts:
            - name: ca-cert
              mountPath: /certs
              readOnly: true
      volumes:
        - name: ca-cert
          secret:
            secretName: mqoq-ca-cert
